name: update-subsidies

on:
  schedule:
    # JSTで 03:00 / 09:00 / 15:00 / 21:00 の1日4回(cronはUTC)
    - cron: "0 18,0,6,12 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Fetch jGrants data
        run: python scripts/fetch_jgrants.py

      - name: Fetch local (自治体) data
        # 守り部審査済み(docs/守り部審査記録.md)。沖縄県・産業振興公社・那覇市を追加収集しマージ
        run: python scripts/fetch_local.py

      - name: Generate LINE deadline alerts
        # 締切7日以内の制度からLINE配信下書きを自動生成(配信は人が実行)
        run: python scripts/generate_line_alerts.py

      - name: Install image deps (Noto CJK fonts)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk
          pip install pillow

      - name: Generate post images
        # posts/launch/*.md の文言をブランド画像(posts/images/*.png)に焼き込み
        run: python scripts/generate_images.py

      - name: Commit updated data
        run: |
          git config user.name "hojo-hq-bot"
          git config user.email "bot@en-life.co.jp"
          git add data/subsidies.json data/line_alerts.json posts/images posts/line
          git diff --cached --quiet || git commit -m "auto: update subsidies & images $(date '+%Y-%m-%d %H:%M')"
          # 実行中に他のpushが入っても落ちないようrebaseしてからpush(最大3回)
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "push retry $i"; sleep 5
          done

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Copy data into site
        run: cp -r data site/data

      - name: Upload site
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
