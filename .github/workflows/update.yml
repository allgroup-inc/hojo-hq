name: update-subsidies

on:
  schedule:
    # JSTгҒ§ 03:00 / 09:00 / 15:00 / 21:00 гҒ®1ж—Ҙ4еӣһ(cronгҒҜUTC)
    - cron: "0 18,0,6,12 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Fetch jGrants data
        run: python scripts/fetch_jgrants.py

      - name: Fetch local (иҮӘжІ»дҪ“) data
        # е®ҲгӮҠйғЁеҜ©жҹ»жёҲгҒҝ(docs/е®ҲгӮҠйғЁеҜ©жҹ»иЁҳйҢІ.md)гҖӮжІ–зё„зңҢгғ»з”ЈжҘӯжҢҜиҲҲе…¬зӨҫгӮ’иҝҪеҠ еҸҺйӣҶгҒ—гғһгғјгӮё
        run: python scripts/fetch_local.py

      - name: Install image deps (Noto CJK fonts)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk
          pip install pillow

      - name: Generate post images
        # posts/launch/*.md гҒ®ж–ҮиЁҖгӮ’гғ–гғ©гғігғүз”»еғҸ(posts/images/*.png)гҒ«з„јгҒҚиҫјгҒҝ
        run: python scripts/generate_images.py

      - name: Commit updated data
        run: |
          git config user.name "hojo-hq-bot"
          git config user.email "bot@en-life.co.jp"
          git add data/subsidies.json posts/images
          git diff --cached --quiet || git commit -m "auto: update subsidies & images $(date '+%Y-%m-%d %H:%M')"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Copy data into site
        run: cp -r data site/data

      - name: Upload site
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
