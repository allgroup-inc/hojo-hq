name: verify-sources

# 100点基準❹: 掲載データと原文の照合を毎日5件自動サンプリング。
# jGrants由来はAPI再取得で厳密照合(キー不要)、県・公社由来はClaude(Haiku)で照合
# (Secrets: ANTHROPIC_API_KEY。未設定の間は該当分のみ自動スキップ)。
# 不一致は Issue を自動起票し、回復したら自動クローズする。

on:
  schedule:
    # JST 10:15(= UTC 01:15)。データ更新(09:00 JST)の後に照合。
    - cron: "15 1 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

concurrency:
  group: verify-sources
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install anthropic

      - name: Run source verification
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/verify_sources.py

      # ── 不一致検知時: Issue を起票 / 既存の未解決Issueに追記 ──
      - name: Open or update issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          gh label create verify-sources --color FBCA04 \
            --description "原文照合で掲載データと原文の不一致を検知" 2>/dev/null || true
          report=verify_report.txt
          [ -f "$report" ] || echo "レポート生成前に失敗しました。Actionsログを確認してください。" > "$report"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          {
            echo "自動検知: 原文照合で不一致が見つかりました。締切・金額は原文通りが絶対ルールです。"
            echo ""
            echo "- 実行: $run_url"
            echo "- 日時(UTC): $(date -u '+%Y-%m-%d %H:%M')"
            echo ""
            echo '```'
            cat "$report"
            echo '```'
          } > issue_body.md
          existing=$(gh issue list --state open --label verify-sources \
            --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body-file issue_body.md
            echo "既存Issue #$existing に追記しました"
          else
            gh issue create --label verify-sources \
              --title "⚠️ 原文照合NG: 掲載データと原文に不一致" \
              --body-file issue_body.md
          fi

      # ── 回復時: 未解決の verify-sources Issue を自動クローズ ──
      - name: Auto-close issue on recovery
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          open=$(gh issue list --state open --label verify-sources \
            --json number --jq '.[].number' 2>/dev/null || true)
          for n in $open; do
            gh issue comment "$n" --body "✅ 直近の原文照合で不一致が解消しました。自動クローズします。"
            gh issue close "$n"
          done
